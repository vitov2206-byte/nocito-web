<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nocito™ — Snap it. Done.</title>
  <meta name="description" content="Nocito — The expense tracker built for real life. Snap receipts, import PDFs, dictate expenses. Your data stays on your phone.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B2A4A; --amber: #F5A623;
      --teal: #2A9D8F; --cream: #F5EDD6;
      --slate: #8899AA; --dark: #0F1B2D;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark); color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }
    .logo { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
    .logo-icon { width: 72px; height: 72px; border-radius: 18px; overflow: hidden; flex-shrink: 0; }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .logo-name { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 700; color: var(--cream); letter-spacing: -0.025em; }
    .logo-name span { color: var(--amber); }
    .logo-name sup { font-size: 16px; color: var(--slate); font-weight: 400; vertical-align: super; margin-left: 1px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(32px, 6vw, 56px); font-weight: 700; color: var(--cream); letter-spacing: -0.025em; margin-bottom: 16px; }
    p.sub { font-size: 18px; color: var(--slate); max-width: 480px; margin: 0 auto 40px; line-height: 1.65; }
    .store-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
    .btn-store { display: flex; align-items: center; gap: 10px; padding: 12px 22px; border-radius: 12px; text-decoration: none; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s, transform 0.15s; }
    .btn-store:hover { transform: translateY(-1px); opacity: 0.88; }
    .btn-android { background: var(--amber); color: var(--navy); }
    .btn-ios { background: rgba(255,255,255,0.05); color: var(--slate); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
    .btn-label { display: flex; flex-direction: column; align-items: flex-start; }
    .btn-label .sub-text { font-size: 10px; opacity: 0.7; line-height: 1; margin-bottom: 2px; letter-spacing: 0.04em; }
    .btn-label .main-text { font-size: 15px; font-weight: 600; line-height: 1; }
    .soon-badge { font-size: 9px; background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 3px; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 5px; vertical-align: middle; }
    .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .links a { font-size: 13px; color: var(--slate); text-decoration: none; transition: color 0.2s; }
    .links a:hover { color: var(--cream); }
    footer { margin-top: 48px; font-size: 12px; color: #3A5070; }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-icon">
      <img src="icon.png" alt="Nocito app icon">
    </div>
    <div class="logo-name">No<span>c</span>ito<sup>™</sup></div>
  </div>

  <h1>Snap it. Done.</h1>

  <p class="sub">The expense tracker built for real life — cash, paper receipts, PDFs, and your voice. Your data never leaves your phone.</p>

  <div class="store-buttons">
    <a href="https://play.google.com/store/apps/details?id=com.nocito.app" class="btn-store btn-android">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M3.18 23.76a2 2 0 0 0 2.89-.52l9.4-9.4-2.9-2.9-9.39 12.82zM20.91 10.27 17.5 8.36l-3.2 3.2 3.2 3.2 3.43-1.93a1.54 1.54 0 0 0 0-2.56zM3 .5A1.5 1.5 0 0 0 2 2v20a1.5 1.5 0 0 0 1 1.41l.18.09 11.2-11.2v-.26L3.18.41 3 .5zM6.07.26l11.43 6.41-3.21 3.21L6.07.26z" fill="#1B2A4A"/>
      </svg>
      <div class="btn-label">
        <span class="sub-text">Available on</span>
        <span class="main-text">Google Play</span>
      </div>
    </a>

    <div class="btn-store btn-ios">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="#556677"/>
      </svg>
      <div class="btn-label">
        <span class="sub-text">Coming to</span>
        <span class="main-text">App Store <span class="soon-badge">soon</span></span>
      </div>
    </div>
  </div>

  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="mailto:nocito.support@gmail.com">nocito.support@gmail.com</a>
  </div>

  <footer>© 2026 Nocito™</footer>

</body>
</html>
